server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**

            - id: workspace-service
              uri: lb://workspace-service
              predicates:
                - Path=/api/v1/workspaces/**
              filters:
                - JwtAuthFilter

            - id: project-task-service
              uri: lb://project-task-service
              predicates:
                - Path=/api/v1/projects/**,/api/v1/tasks/**
              filters:
                - JwtAuthFilter

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - JwtAuthFilter

            - id: file-service
              uri: lb://file-service
              predicates:
                - Path=/api/v1/files/**
              filters:
                - JwtAuthFilter

jwt:
  secret: bXlzdXBlcnNlY3JldGtleWZvcnByb2plY3RtYW5hZ2VtZW50cGxhdGZvcm0=

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true